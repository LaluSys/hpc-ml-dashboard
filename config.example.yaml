cluster:
  hostname: its-cs1.its.uni-kassel.de
  username: uk_DEINE_NUMMER   # z.B. uk058285 — DIESE DATEI UMBENENNEN zu config.yaml, nie committen!
  port: 22
  remote_workdir: ~/ml-jobs   # Wird automatisch angelegt

defaults:
  partition: pub23            # oder pub23gpu für GPU-Jobs
  time: "02:00:00"
  mem: "16G"
  cpus: 4
  modules:
    - python/3.13.0/gcc-14.2.0
    # - nvidia-hpc-sdk/25.1/cuda-12.6  # nur für GPU-Jobs einkommentieren
